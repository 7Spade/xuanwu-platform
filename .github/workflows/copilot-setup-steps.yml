name: "Copilot Setup Steps"

# Runs automatically on changes to this file for validation.
# Also runs before the Copilot coding agent starts its session.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job name MUST be `copilot-setup-steps` — Copilot coding agent only
  # picks up a job with this exact name.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js setup with caching ensures MCP servers that use `npx -y` have
      # their packages cached across runs, which speeds up server startup.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      # uv is NOT installed on GitHub-hosted ubuntu runners by default.
      # Serena, markitdown, and agent-memory MCP servers are distributed as Python
      # packages and launched via `uvx`, so uv must be present before the agent starts.
      # Reference: https://docs.github.com/en/copilot/using-github-copilot/coding-agent/extending-copilot-coding-agent-with-mcp#validating-your-mcp-configuration
      - name: Install uv (required by Serena, markitdown, and agent-memory MCP servers)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Pre-install Python-based MCP servers so the agent doesn't wait for cold-start
      # downloads on first invocation. uv tool install caches the virtualenvs in
      # ~/.local/share/uv/tools/  which is restored from the uv cache above.
      - name: Pre-install Python MCP servers (serena, markitdown)
        run: |
          uv tool install markitdown-mcp
          uv tool install "git+https://github.com/oraios/serena"

      # Pre-install npm-based MCP servers globally so `npx -y <pkg>` is a no-op cache
      # hit when the agent actually calls each server. github: installs are excluded from
      # the npm cache key but still benefit from the Node.js binary cache above.
      - name: Pre-install npm MCP servers (sequential-thinking, software-planning, everything, filesystem, context7, repomix)
        run: |
          npm install -g \
            @modelcontextprotocol/server-sequential-thinking \
            @modelcontextprotocol/server-everything \
            @modelcontextprotocol/server-filesystem \
            @upstash/context7-mcp \
            repomix
          npm install -g "github:NightTrek/Software-planning-mcp"
